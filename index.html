<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#bfe9ff" />
  <title>ピラミッド犬 〜いやしのまきば〜</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css?v=11" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="app"></div>

  <div id="title">
    <h1>ピラミッド犬</h1>
    <p>いやしの まきば</p>
    <div id="hearts">🤍🤍🤍🤍</div>
  </div>

  <div id="top-buttons">
    <button id="btn-shot" title="しゃしんをとる">📷</button>
    <button id="sound-toggle" title="おと オン/オフ">🔊</button>
  </div>

  <div id="actions">
    <button id="btn-look">👀 こっちむいて</button>
    <button id="btn-come">🐾 おいで</button>
    <button id="btn-ball">🎾 ボール</button>
    <button id="btn-treat">🍎 おやつ</button>
    <div id="dog-buttons" class="dog-row">
      <button id="btn-add">🐶➕ ふやす</button>
      <button id="btn-remove" title="1ぴき おかえり">➖</button>
      <span id="dog-count">1/5</span>
    </div>
    <div id="dog-buttons-chibi" class="dog-row">
      <button id="btn-add-chibi">🐶➕ ちび</button>
      <button id="btn-remove-chibi" title="1ぴき おかえり">➖</button>
      <span id="chibi-count">0/5</span>
    </div>
  </div>

  <div id="hint">タップで よろこぶ ／ ながおしで なでなで ／ ボタンで あそぶ</div>

  <div id="bubble"></div>
  <div id="fx-layer"></div>

  <script type="module" src="main.js?v=11"></script>
</body>
</html>
